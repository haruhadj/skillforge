map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
  listen 80;
  server_name _;

  # Edge hardening: don't leak the nginx version in responses/error pages, and
  # cap request bodies — the default 1m can 413 legitimate TTS/word POSTs.
  server_tokens off;
  client_max_body_size 2m;

  # Docker's embedded DNS. Backend containers can be redeployed/recreated
  # independently of nginx and get a new IP; a plain hostname in proxy_pass
  # is only resolved once and cached for the worker's lifetime, so without
  # this + a $var in each proxy_pass, nginx keeps sending traffic to the old
  # dead IP after a rolling redeploy until nginx itself is restarted.
  resolver 127.0.0.11 valid=10s;

  # Lightweight liveness endpoint for the container healthcheck. It does not
  # touch any upstream, so it reflects nginx itself being up (not the frontend).
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Next.js frontend
  location / {
    set $upstream_frontend frontend:3000;
    proxy_pass http://$upstream_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Vocab REST API (must be before the spelling-bee catch-all)
  location /api/vocab/ {
    set $upstream_vocab vocab:8788;
    proxy_pass http://$upstream_vocab;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Hamaru (ハマル) JMdict REST API
  location /api/hamaru/ {
    set $upstream_hamaru hamaru:8789;
    proxy_pass http://$upstream_hamaru;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Spelling Bee REST API — only its real endpoints; everything else
  # under /api/ must fall through to the Next.js frontend (location /).
  location ~ ^/api/(words|tts|health|log-current-word)\b {
    set $upstream_spelling_bee spelling-bee:8787;
    proxy_pass http://$upstream_spelling_bee;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /tictactoe-ws/ {
    set $upstream_tictactoe tictactoe:3005;
    proxy_pass http://$upstream_tictactoe;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location /chess-ws/ {
    set $upstream_chess chess:3004;
    proxy_pass http://$upstream_chess;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location /chroma-memory-ws/ {
    set $upstream_chroma_memory chroma-memory:3002;
    proxy_pass http://$upstream_chroma_memory;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
