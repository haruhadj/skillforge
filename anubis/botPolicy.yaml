bots:
  # Same-origin app traffic that must never see a PoW interstitial: the
  # Socket.IO game servers, every REST/Next.js API route, and the static
  # game iframe bundles under public/games/<id>/. All of these are only ever
  # requested by JS already running inside a page that has already passed
  # the challenge, or need to respond immediately for gameplay (websockets).
  - name: allow-game-websockets
    path_regex: ^/(tictactoe|chess|chroma-memory)-ws/
    action: ALLOW
  - name: allow-api-routes
    path_regex: ^/api/
    action: ALLOW
  - name: allow-game-assets
    path_regex: ^/games/
    action: ALLOW
  # Next.js's own build output (JS chunks, CSS, fonts, image-optimizer
  # endpoint). Missing this exempts the HTML document but not what it
  # depends on - the page loads, then every chunk/font fetch gets
  # challenged and comes back as HTML instead of JS, breaking hydration.
  - name: allow-nextjs-static
    path_regex: ^/_next/
    action: ALLOW
  # Misc top-level static files served straight out of public/ (favicon,
  # logos, fonts) by extension, so they're covered regardless of path.
  - name: allow-static-file-extensions
    path_regex: \.(jpg|jpeg|png|gif|webp|svg|ico|woff2?|ttf|css|map)$
    action: ALLOW

  # Techaro-maintained default ruleset: known AI-scraper denies, known-good
  # crawler allows (Google/Bing/DuckDuckGo/etc.), well-known/favicon/robots.txt
  # allows, and the generic-browser weight rule that feeds the thresholds below.
  - import: (data)/meta/default-config.yaml

# default-config.yaml (imported above) only supplies the `bots:` list, not the
# weight thresholds that turn accumulated weight into a CHALLENGE action -
# those have to be declared explicitly. This mirrors Anubis' shipped default
# botPolicies.yaml graduated difficulty ramp.
thresholds:
  - name: minimal-suspicion
    expression: weight < 0
    action: ALLOW
  - name: mild-suspicion
    expression:
      all: ["weight >= 0", "weight < 10"]
    action: CHALLENGE
    challenge:
      algorithm: metarefresh
      difficulty: 1
  - name: moderate-suspicion
    expression:
      all: ["weight >= 10", "weight < 20"]
    action: CHALLENGE
    challenge:
      algorithm: fast
      difficulty: 2
  - name: mild-proof-of-work
    expression:
      all: ["weight >= 20", "weight < 30"]
    action: CHALLENGE
    challenge:
      algorithm: fast
      difficulty: 4
  - name: extreme-suspicion
    expression: weight >= 30
    action: CHALLENGE
    challenge:
      algorithm: fast
      difficulty: 6

# Lets Discord/Slack/Twitter link unfurls of game pages keep working without
# allowlisting every social-media scraper by name.
openGraph:
  enabled: true
  considerHost: true
  ttl: 24h
