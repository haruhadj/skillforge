services:
  nginx:
    image: nginx:alpine
    container_name: skillforge-nginx
    restart: unless-stopped
    # Resource caps so no single service can OOM the Raspberry Pi (audit H2).
    mem_limit: 64m
    pids_limit: 128
    ports:
      - "1234:80"
    volumes:
      - ./nginx/skillforge.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - tictactoe
      - chess
      - chroma-memory
      - spelling-bee
      - vocab
      - hamaru

  frontend:
    image: ghcr.io/haruhadj/skillforge-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        # OAuth client IDs/secrets are server-side only (read at runtime in
        # app/api/auth/callback/*). They are intentionally NOT build args:
        # build args get baked into image layer history (docker history) and
        # they are not declared as ARG in Dockerfile.frontend anyway. They are
        # provided at runtime via the `environment:` block below.
    container_name: skillforge-frontend
    restart: unless-stopped
    mem_limit: 512m
    pids_limit: 512
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FIREBASE_ADMIN_CLIENT_EMAIL=${FIREBASE_ADMIN_CLIENT_EMAIL}
      - FIREBASE_ADMIN_PRIVATE_KEY=${FIREBASE_ADMIN_PRIVATE_KEY}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET}
      - TIKTOK_OAUTH_CLIENT_KEY=${TIKTOK_OAUTH_CLIENT_KEY}
      - TIKTOK_OAUTH_CLIENT_SECRET=${TIKTOK_OAUTH_CLIENT_SECRET}
      - FACEBOOK_OAUTH_CLIENT_ID=${FACEBOOK_OAUTH_CLIENT_ID}
      - FACEBOOK_OAUTH_CLIENT_SECRET=${FACEBOOK_OAUTH_CLIENT_SECRET}
      - TWITTER_OAUTH_CLIENT_ID=${TWITTER_OAUTH_CLIENT_ID}
      - TWITTER_OAUTH_CLIENT_SECRET=${TWITTER_OAUTH_CLIENT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    depends_on:
      - tictactoe
      - chess
      - chroma-memory
      - spelling-bee
      - vocab
      - hamaru

  tictactoe:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-tictactoe
    restart: unless-stopped
    command: ["node", "server/games/tictactoe/socket-server.js"]
    mem_limit: 192m
    pids_limit: 256
    environment:
      - TICTACTOE_PORT=3005
    expose:
      - "3005"

  chess:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-chess
    restart: unless-stopped
    command: ["node", "server/games/chess/socket-server.js"]
    mem_limit: 192m
    pids_limit: 256
    environment:
      - CHESS_PORT=3004
    expose:
      - "3004"

  chroma-memory:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-chroma-memory
    restart: unless-stopped
    command: ["node", "server/games/chroma-memory/socket-server.js"]
    mem_limit: 192m
    pids_limit: 256
    environment:
      - CHROMA_MEMORY_PORT=3002
    expose:
      - "3002"

  spelling-bee:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-spelling-bee
    restart: unless-stopped
    command: ["node", "server/games/spelling-bee/server.js"]
    mem_limit: 256m
    pids_limit: 256
    environment:
      - NODE_ENV=production
      - PORT=8787
      - HOST=0.0.0.0
      - GOOGLE_APPLICATION_CREDENTIALS=/app/tts-key.json
      - VOCAB_API_ORIGIN=http://vocab:8788
    expose:
      - "8787"
    volumes:
      - ./server/tts-key.json:/app/tts-key.json:ro
      - ./server/wordnet/oewn-2025-sqlite-2.3.2.sqlite:/app/server/wordnet/oewn-2025-sqlite-2.3.2.sqlite:ro
    depends_on:
      - vocab

  vocab:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-vocab
    restart: unless-stopped
    command: ["node", "server/games/vocab/server.js"]
    mem_limit: 256m
    pids_limit: 256
    environment:
      - NODE_ENV=production
      - VOCAB_PORT=8788
      - VOCAB_HOST=0.0.0.0
    expose:
      - "8788"
    volumes:
      - ./server/wordnet/oewn-2025-sqlite-2.3.2.sqlite:/app/server/wordnet/oewn-2025-sqlite-2.3.2.sqlite:ro

  hamaru:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-hamaru
    restart: unless-stopped
    command: ["node", "server/games/hamaru/server.js"]
    mem_limit: 320m
    pids_limit: 256
    environment:
      - NODE_ENV=production
      - HAMARU_PORT=8789
      - HAMARU_HOST=0.0.0.0
    expose:
      - "8789"
    # The 16 MB JMdict JSON is baked into the image (server/Dockerfile copies
    # server/games), so no volume mount is needed.

networks:
  default:
    name: skillforge-net