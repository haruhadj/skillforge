services:
  nginx:
    image: nginx:alpine
    container_name: skillforge-nginx
    restart: unless-stopped
    # Resource caps so no single service can OOM the Raspberry Pi (audit H2).
    mem_limit: 64m
    pids_limit: 128
    ports:
      - "1234:80"
    volumes:
      - ./nginx/skillforge.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      # Use 127.0.0.1, not localhost: inside the container `localhost` can resolve to
      # IPv6 ::1 first, but nginx only listens on IPv4 (`listen 80`) → connection refused.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      frontend:
        condition: service_healthy
      tictactoe:
        condition: service_healthy
      chess:
        condition: service_healthy
      chroma-memory:
        condition: service_healthy
      spelling-bee:
        condition: service_healthy
      vocab:
        condition: service_healthy
      hamaru:
        condition: service_healthy

  frontend:
    image: ghcr.io/haruhadj/skillforge-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        # OAuth client IDs/secrets are server-side only (read at runtime in
        # app/api/auth/callback/*). They are intentionally NOT build args:
        # build args get baked into image layer history (docker history) and
        # they are not declared as ARG in Dockerfile.frontend anyway. They are
        # provided at runtime via the `environment:` block below.
    container_name: skillforge-frontend
    restart: unless-stopped
    mem_limit: 512m
    pids_limit: 512
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      # Next.js standalone (`node server.js`) binds to $HOSTNAME, which Docker
      # otherwise sets to the container ID — so it would NOT listen on 127.0.0.1 and
      # the loopback healthcheck below would fail. Bind to all interfaces instead.
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - RESEND_API_KEY=${RESEND_API_KEY}
      # Shared secret the leaderboard recompute route checks (timingSafeEqual) before
      # running the full collectionGroup scan. Provisioned in the Pi .env (.env.example).
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      - FIREBASE_ADMIN_CLIENT_EMAIL=${FIREBASE_ADMIN_CLIENT_EMAIL}
      - FIREBASE_ADMIN_PRIVATE_KEY=${FIREBASE_ADMIN_PRIVATE_KEY}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET}
      - TIKTOK_OAUTH_CLIENT_KEY=${TIKTOK_OAUTH_CLIENT_KEY}
      - TIKTOK_OAUTH_CLIENT_SECRET=${TIKTOK_OAUTH_CLIENT_SECRET}
      - FACEBOOK_OAUTH_CLIENT_ID=${FACEBOOK_OAUTH_CLIENT_ID}
      - FACEBOOK_OAUTH_CLIENT_SECRET=${FACEBOOK_OAUTH_CLIENT_SECRET}
      - TWITTER_OAUTH_CLIENT_ID=${TWITTER_OAUTH_CLIENT_ID}
      - TWITTER_OAUTH_CLIENT_SECRET=${TWITTER_OAUTH_CLIENT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3000,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      tictactoe:
        condition: service_healthy
      chess:
        condition: service_healthy
      chroma-memory:
        condition: service_healthy
      spelling-bee:
        condition: service_healthy
      vocab:
        condition: service_healthy
      hamaru:
        condition: service_healthy

  tictactoe:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-tictactoe
    restart: unless-stopped
    command: ["node", "server/games/tictactoe/socket-server.js"]
    mem_limit: 192m
    pids_limit: 256
    environment:
      - TICTACTOE_PORT=3005
    expose:
      - "3005"
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3005,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  chess:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-chess
    restart: unless-stopped
    command: ["node", "server/games/chess/socket-server.js"]
    mem_limit: 192m
    pids_limit: 256
    environment:
      - CHESS_PORT=3004
    expose:
      - "3004"
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3004,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  chroma-memory:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-chroma-memory
    restart: unless-stopped
    command: ["node", "server/games/chroma-memory/socket-server.js"]
    mem_limit: 192m
    pids_limit: 256
    environment:
      - CHROMA_MEMORY_PORT=3002
    expose:
      - "3002"
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3002,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  spelling-bee:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-spelling-bee
    restart: unless-stopped
    command: ["node", "server/games/spelling-bee/server.js"]
    mem_limit: 256m
    pids_limit: 256
    environment:
      - NODE_ENV=production
      - PORT=8787
      - HOST=0.0.0.0
      - VOCAB_API_ORIGIN=http://vocab:8788
    expose:
      - "8787"
    volumes:
      - ./server/wordnet/oewn-2025-sqlite-2.3.2.sqlite:/app/server/wordnet/oewn-2025-sqlite-2.3.2.sqlite:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(8787,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      vocab:
        condition: service_healthy

  vocab:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-vocab
    restart: unless-stopped
    command: ["node", "server/games/vocab/server.js"]
    mem_limit: 256m
    pids_limit: 256
    environment:
      - NODE_ENV=production
      - VOCAB_PORT=8788
      - VOCAB_HOST=0.0.0.0
    expose:
      - "8788"
    volumes:
      - ./server/wordnet/oewn-2025-sqlite-2.3.2.sqlite:/app/server/wordnet/oewn-2025-sqlite-2.3.2.sqlite:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(8788,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  hamaru:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-hamaru
    restart: unless-stopped
    command: ["node", "server/games/hamaru/server.js"]
    mem_limit: 320m
    pids_limit: 256
    environment:
      - NODE_ENV=production
      - HAMARU_PORT=8789
      - HAMARU_HOST=0.0.0.0
    expose:
      - "8789"
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(8789,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    # The 16 MB JMdict JSON is baked into the image (server/Dockerfile copies
    # server/games), so no volume mount is needed.

  # Hourly leaderboard recompute so a *user* request never pays the full
  # collectionGroup-scan cost (the read path only self-heals lazily on staleness —
  # audit R8-1). Calls the internal recompute route over the private Docker network
  # (never exposed externally), authenticated with INTERNAL_API_SECRET. A heartbeat
  # loop is used instead of crond to avoid busybox crond's env-propagation quirks.
  cron:
    image: alpine:3.19
    container_name: skillforge-cron
    restart: unless-stopped
    mem_limit: 16m
    pids_limit: 64
    environment:
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
    command:
      - sh
      - -c
      - |
        while true; do
          wget -qO- --post-data='{}' \
            --header="Authorization: Bearer $$INTERNAL_API_SECRET" \
            --header="Content-Type: application/json" \
            http://frontend:3000/api/internal/leaderboards/recompute || true
          sleep 3600
        done
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x sh >/dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      frontend:
        condition: service_healthy

networks:
  default:
    name: skillforge-net