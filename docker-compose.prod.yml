services:
  nginx:
    image: nginx:alpine
    container_name: skillforge-nginx
    restart: unless-stopped
    ports:
      - "1234:80"
    volumes:
      - ./nginx/skillforge.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - tictactoe
      - chess
      - chroma-memory
      - spelling-bee
      - vocab

  frontend:
    image: ghcr.io/haruhadj/skillforge-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
        GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
    container_name: skillforge-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FIREBASE_ADMIN_CLIENT_EMAIL=${FIREBASE_ADMIN_CLIENT_EMAIL}
      - FIREBASE_ADMIN_PRIVATE_KEY=${FIREBASE_ADMIN_PRIVATE_KEY}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    depends_on:
      - tictactoe
      - chess
      - chroma-memory
      - spelling-bee
      - vocab

  tictactoe:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-tictactoe
    restart: unless-stopped
    command: ["node", "server/games/tictactoe/socket-server.js"]
    environment:
      - TICTACTOE_PORT=3005
    expose:
      - "3005"

  chess:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-chess
    restart: unless-stopped
    command: ["node", "server/games/chess/socket-server.js"]
    environment:
      - CHESS_PORT=3004
    expose:
      - "3004"

  chroma-memory:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-chroma-memory
    restart: unless-stopped
    command: ["node", "server/games/chroma-memory/socket-server.js"]
    environment:
      - CHROMA_MEMORY_PORT=3002
    expose:
      - "3002"

  spelling-bee:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-spelling-bee
    restart: unless-stopped
    command: ["node", "server/games/spelling-bee/server.js"]
    environment:
      - NODE_ENV=production
      - PORT=8787
      - HOST=0.0.0.0
      - GOOGLE_APPLICATION_CREDENTIALS=/app/tts-key.json
      - VOCAB_API_ORIGIN=http://vocab:8788
    expose:
      - "8787"
    volumes:
      - ./server/tts-key.json:/app/tts-key.json:ro
      - ./server/wordnet/oewn-2025-sqlite-2.3.2.sqlite:/app/server/wordnet/oewn-2025-sqlite-2.3.2.sqlite:ro
    depends_on:
      - vocab

  vocab:
    image: ghcr.io/haruhadj/skillforge-server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: skillforge-vocab
    restart: unless-stopped
    command: ["node", "server/games/vocab/server.js"]
    environment:
      - NODE_ENV=production
      - VOCAB_PORT=8788
      - VOCAB_HOST=0.0.0.0
    expose:
      - "8788"
    volumes:
      - ./server/wordnet/oewn-2025-sqlite-2.3.2.sqlite:/app/server/wordnet/oewn-2025-sqlite-2.3.2.sqlite:ro

networks:
  default:
    name: skillforge-net